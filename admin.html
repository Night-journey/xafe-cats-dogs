<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 西财流浪猫狗</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
    <style>
        .login-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fff5f5 0%, #f0fffe 100%);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: var(--gray);
            margin-bottom: 40px;
        }

        .login-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            background: #ffe5e5;
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-back {
            margin-top: 30px;
        }

        .login-back a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .login-back a:hover {
            color: var(--primary);
        }

        /* 宠物图标动画 */
        .login-pets {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            font-size: 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🐾</span>
                <span class="logo-text">西财流浪动物</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="map.html">校园地图</a></li>
                <li><a href="gallery.html">🐾 猫狗图鉴</a></li>
                <li><a href="forum.html">论坛</a></li>
                <li><a href="entrust.html">委托</a></li>
                <li><a href="adoption.html">领养</a></li>
                <li><a href="rescue.html">救助知识</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">首页</a>
        <a href="map.html">校园地图</a>
        <a href="gallery.html">🐾 猫狗图鉴</a>
        <a href="forum.html">论坛</a>
        <a href="entrust.html">委托</a>
        <a href="adoption.html">领养</a>
        <a href="rescue.html">救助知识</a>
        <a href="about.html">关于我们</a>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-icon">🔐</div>
            <h1 class="login-title">管理员登录</h1>
            <p class="login-subtitle">请输入管理员密码进入后台</p>
            
            <div class="login-error" id="loginError">密码错误，请重试</div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="adminPassword">管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
            </form>
            
            <div class="login-pets">
                <span>🐱</span>
                <span>🐕</span>
                <span>🐱</span>
            </div>
            
            <div class="login-back">
                <a href="gallery.html">← 返回图鉴页面</a>
            </div>
        </div>
    </main>

    <script>
        // 默认管理员密码（后续可在服务器端配置）
        const ADMIN_PASSWORD = 'admin123';
        
        // 检查是否已登录
        if (localStorage.getItem('isAdmin') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (password === ADMIN_PASSWORD) {
                // 登录成功
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminLoginTime', Date.now());
                window.location.href = 'admin-dashboard.html';
            } else {
                // 登录失败
                errorEl.classList.add('show');
                // 3秒后隐藏错误提示
                setTimeout(() => {
                    errorEl.classList.remove('show');
                }, 3000);
            }
        });

        // 移动端菜单
        document.getElementById('navToggle').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
    </script>
</body>
</html>
