    <main class="page-content">
        <div class="container">
            <h1 class="page-title">🐾 猫狗图鉴</h1>

            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="cat">🐱 猫咪</button>
                <button class="filter-btn" data-filter="dog">🐕 狗狗</button>

            <!-- 上传图片按钮 -->

                        <div class="detail-info-item">

                        </div>
                        <div class="detail-info-item">
                            <span class="detail-info-label">🎂 预估年龄</span>

                        </div>
                        <div class="detail-info-item">

                        </div>
                        <div class="detail-info-item">

                        <div class="detail-info-item">

                            <span id="detailActiveTime">-</span>
                        </div>
                        <div class="detail-info-item">

    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script>
        let currentAnimalId = null;
        
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            initGallery();
            // 覆盖原 showGalleryDetail 函数
            window.showGalleryDetail = function(id) {
                currentAnimalId = id;
                const animal = GALLERY_DATA.find(a => a.id === id);
                
                // 调用原来的函数
                originalShowGalleryDetail(id);
                
                // 更新头像显示
                if (animal) {
                    setTimeout(() => updateDetailImage(animal), 100);
                }
            };
            
            // 保存原函数
            window.originalShowGalleryDetail = window.showGalleryDetail;
        });

        // 替换原 initGallery 函数，在卡片中也显示自定义头像
        const originalInitGallery = window.initGallery;
        window.initGallery = function() {
            if (originalInitGallery) originalInitGallery();
            // 延迟更新卡片头像
            setTimeout(updateAllCardImages, 200);
        };

        // 更新所有卡片的头像
        function updateAllCardImages() {
            const customAvatars = JSON.parse(localStorage.getItem('animalAvatars') || '{}');
            Object.keys(customAvatars).forEach(id => {
                updateCardImage(parseInt(id), customAvatars[id]);
            });
        }

        // 更新单个卡片头像
        function updateCardImage(animalId, imageUrl) {
            const card = document.querySelector(`[data-id="${animalId}"]`);
            if (card) {
                const imgDiv = card.querySelector('.gallery-card-image');
                if (imgDiv) {
                    imgDiv.innerHTML = `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:cover;">`;
                }
            }
        }

        // 更新详情页头像
        function updateDetailImage(animal) {
            const detailImage = document.getElementById('detailImage');
            if (!detailImage) return;
            
            // 检查是否有自定义头像
            const customAvatars = JSON.parse(localStorage.getItem('animalAvatars') || '{}');
            const avatarUrl = customAvatars[animal.id];
            const emoji = animal.type === 'cat' ? '🐱' : '🐕';
            
            detailImage.innerHTML = avatarUrl 
                ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` 
                : emoji;
            
            // 添加上传按钮
            const uploadBtn = document.createElement('button');
            uploadBtn.innerHTML = '+';
            uploadBtn.style.cssText = 'position: absolute; bottom: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; border: none; background: #4CAF50; color: white; cursor: pointer; font-size: 20px;';
            uploadBtn.title = '更换头像';
            uploadBtn.onclick = function() {
                document.getElementById('avatarUpload' + animal.id).click();
            };
            detailImage.appendChild(uploadBtn);
            
            // 添加文件输入
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.id = 'avatarUpload' + animal.id;
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            fileInput.onchange = (e) => handleAvatarUpload(e, animal.id);
            detailImage.appendChild(fileInput);
        }

        // 处理头像上传
        async function handleAvatarUpload(e, animalId) {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    // 保存到 localStorage
                    const customAvatars = JSON.parse(localStorage.getItem('animalAvatars') || '{}');
                    customAvatars[animalId] = data.url;
                    localStorage.setItem('animalAvatars', JSON.stringify(customAvatars));
                    
                    // 更新详情页和卡片
                    updateDetailImage({ id: animalId, type: GALLERY_DATA.find(a => a.id === animalId)?.type });
                    updateCardImage(animalId, data.url);
                    
                    alert('头像更新成功！');
                } else {
                    alert('上传失败：' + data.error);
                }
            } catch (err) {
                alert('上传失败');
            }
            
            e.target.value = '';
        }

        // 上传图片功能
        document.getElementById('imageUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            // 显示加载状态
            const btn = e.target.nextElementSibling;
            const originalText = btn.innerHTML;
            btn.innerHTML = '上传中...';
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('上传成功！图片地址：' + data.url + '\n\n请复制此地址用于更新动物档案');
                } else {
                    alert('上传失败：' + data.error);
                }
            } catch (err) {
                alert('上传失败，请确保服务器已配置上传服务');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                e.target.value = ''; // 清空输入框
            }
        });
    </script>
